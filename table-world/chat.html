<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信 - 聊天记录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #e5e5e5; font-family: 'Microsoft YaHei', sans-serif; }
    .wechat-pc { display: flex; height: 100%; background: #fff; border: 1px solid #d6d6d6; }
    .contact-list { width: 260px; background: #f5f5f5; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
    .search-box { padding: 15px; border-bottom: 1px solid #e0e0e0; }
    .search-box input { width: 100%; padding: 6px 10px; border: 1px solid #dcdcdc; border-radius: 4px; font-size: 13px; background: #fff; }
    .contact-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eaeaea; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
    .contact-item:hover { background: #e8e8e8; }
    .contact-item.active { background: #d9d9d9; }
    .contact-item .avatar { width: 36px; height: 36px; border-radius: 4px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; overflow: hidden; }
    .contact-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .contact-item .name { font-size: 14px; font-weight: 500; }
    .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header { padding: 15px 20px; border-bottom: 1px solid #e0e0e0; font-size: 16px; font-weight: bold; background: #fafafa; flex-shrink: 0; }
    .chat-log { flex: 1; padding: 20px; overflow-y: auto; background: #f5f5f5; }

    /* 消息行 */
    .message-row { display: flex; margin-bottom: 20px; }
    .message-row.mine { flex-direction: row-reverse; }   /* 我的消息：头像在右 */
    .message-row.other { flex-direction: row; }          /* 对方消息：头像在左 */
    .message-row.system { justify-content: center; }

    .message-avatar { width: 36px; height: 36px; border-radius: 4px; flex-shrink: 0; overflow: hidden; }
    .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .message-body { max-width: 60%; display: flex; flex-direction: column; }
    .message-body .sender-name { font-size: 11px; color: #999; margin-bottom: 4px; padding: 0 4px; }
    .message-body .bubble { padding: 10px 15px; border-radius: 4px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    /* 对方气泡 */
    .message-row.other .bubble { background: #fff; border: 1px solid #ededed; }
    .message-row.other .sender-name { text-align: left; }
    /* 自己气泡 */
    .message-row.mine .bubble { background: #95EC69; }
    .message-row.mine .sender-name { text-align: right; }
    /* 系统消息 */
    .message-row.system .bubble { background: #e5e5e5; color: #888; font-size: 12px; border-radius: 4px; padding: 5px 12px; max-width: 100%; }
    .message-row.system .sender-name { display: none; }

    .time-divider { text-align: center; margin: 15px 0; font-size: 12px; color: #999; }
    .chat-input-area { border-top: 1px solid #e0e0e0; padding: 15px; background: #fff; display: flex; gap: 10px; flex-shrink: 0; }
    .chat-input-area.hidden { display: none; }
    .chat-input-area input { flex: 1; padding: 8px 12px; border: 1px solid #dcdcdc; border-radius: 4px; font-size: 13px; }
    .chat-input-area button { padding: 8px 20px; background: #07C160; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    /* 公众号推文卡片 */
    .article-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; max-width: 300px; cursor: pointer; margin-bottom: 4px; }
    .article-card .cover { width: 100%; height: 140px; background: #ddd; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; }
    .article-card .cover img { width: 100%; height: 100%; object-fit: cover; }
    .article-card .title { padding: 10px 15px 5px; font-weight: bold; font-size: 14px; }
    .article-card .desc { padding: 0 15px 10px; color: #666; font-size: 12px; }
    .article-card .pub-date { padding: 0 15px 10px; font-size: 11px; color: #999; }
  </style>
</head>
<body>
  <div class="wechat-pc">
    <div class="contact-list">
      <div class="search-box"><input type="text" placeholder="搜索" disabled></div>
      <div class="contact-item active" data-contact="linyue" data-type="friend">
        <div class="avatar"><img src="../assets/images/wechat_avatar_linyue.png" alt="林越"></div>
        <div class="name">林越</div>
      </div>
      <div class="contact-item" data-contact="shentan" data-type="official">
        <div class="avatar" style="background:#FF6B6B;">探</div>
        <div class="name">深夜探秘</div>
      </div>
      <div class="contact-item" data-contact="daily" data-type="official">
        <div class="avatar" style="background:#4ECDC4;">日</div>
        <div class="name">静湖日报</div>
      </div>
      <div class="contact-item" data-contact="wechat" data-type="official">
        <div class="avatar" style="background:#999;">微</div>
        <div class="name">微信团队</div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header" id="chatHeader">林越</div>
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-area" id="chatInputArea">
        <input type="text" id="messageInput" placeholder="输入消息..." maxlength="200">
        <button id="sendBtn">发送</button>
      </div>
    </div>
  </div>

  <audio id="autoReplySound" src="../assets/audio/auto_reply.mp3" preload="auto"></audio>

  <script>
    (function() {
      function getRecentDate(daysAgo) {
        var now = new Date(); var target = new Date(now); target.setDate(now.getDate() - daysAgo);
        var month = target.getMonth() + 1; var day = target.getDate();
        var weekdays = ['日','一','二','三','四','五','六'];
        if (daysAgo === 0) return '今天';
        return month + '月' + day + '日 星期' + weekdays[target.getDay()];
      }

      var dateLabels = { day5: getRecentDate(5), day3: getRecentDate(3), yesterday: '昨天', today: getRecentDate(0) };

      var chatData = {
        linyue: [
          { type: 'divider', text: dateLabels.day5 + ' 晚上21:15' },
          { type: 'other', text: '陈垣，你听说过静湖镇那个案子吗？九十年代天文观测站研究员失踪的事。', sender: '林越' },
          { type: 'mine', text: '好像有点印象，但网上资料特别少。你找到什么了？', sender: '陈垣' },
          { type: 'divider', text: dateLabels.day3 + ' 下午15:40' },
          { type: 'other', text: "我托人搞到了一批旧档案的电子版，里面提到了一个坐标。那个地方就在静湖镇废弃观测站附近。", sender: '林越' },
          { type: 'mine', text: '你打算自己去？别冲动，那地方太偏了。', sender: '陈垣' },
          { type: 'divider', text: dateLabels.yesterday + ' 上午10:08' },
          { type: 'other', text: '我已经在路上了。档案里还说，观测站当年的无线电信号记录过一段奇怪的脉冲，听起来像是有规律的数字。', sender: '林越' },
          { type: 'other', text: '如果我明天还没回你消息，就把我发给你的压缩包发到网上。我已经上传到“谜域”论坛了，帖子名叫“关于静湖镇九十年代案件”。', sender: '林越' },
          { type: 'mine', text: '你发了什么东西？我怎么没看到？', sender: '陈垣' },
          { type: 'other', text: '是那个压缩包，silent_archive.zip。别怕，信我。去那个帖子下载，里面有线索。', sender: '林越' },
          { type: 'divider', text: dateLabels.today + ' 上午11:20' },
          { type: 'mine', text: '林越，你还好吗？', sender: '陈垣' },
          { type: 'mine', text: '看到回个话，我很担心。', sender: '陈垣' },
          { type: 'system', text: '[语音通话] 对方已拒绝' },
          { type: 'mine', text: '快接电话啊！', sender: '陈垣' },
          { type: 'mine', text: '我马上去论坛找你发的那个帖子。', sender: '陈垣' }
        ],
        shentan: [
          { type: 'divider', text: getRecentDate(7) + ' 下午20:42' },
          { type: 'other', article: { cover: '../assets/images/briefing_stone_eye.png', title: '⚠️ 震惊！未解之谜——静湖镇失踪事件竟与一个神秘坐标有关？至今未解！', desc: '近日有网友在“谜域”论坛上传了一份据称来自警方内部的压缩包，里面可能藏着当年那起离奇失踪案的真相……', date: getRecentDate(7) }, sender: '深夜探秘' },
          { type: 'divider', text: getRecentDate(10) + ' 上午09:15' },
          { type: 'other', text: '你相信时空错位吗？我们收到了粉丝投稿，说他家阁楼里发现了一台1998年的旧电脑……', sender: '深夜探秘' },
          { type: 'other', text: '关注我，带你探索世界未解之谜！', sender: '深夜探秘' }
        ],
        daily: [
          { type: 'divider', text: getRecentDate(2) + ' 上午07:30' },
          { type: 'other', text: '【静湖日报】今日天气：晴，-5℃~3℃，北风3级。', sender: '静湖日报' },
          { type: 'divider', text: getRecentDate(4) + ' 上午08:00' },
          { type: 'other', text: '【社区通知】静湖镇天文观测站因设施老化，将于本月起封闭维护，请市民不要靠近。', sender: '静湖日报' },
          { type: 'divider', text: getRecentDate(8) + ' 上午07:45' },
          { type: 'other', article: { cover: '../assets/images/placeholder_observatory.png', title: '老档案：30多年前天文台研究员失踪事件回顾', desc: '上世纪九十年代，静湖镇天文观测站研究员魏明远在值夜班时神秘失踪，至今下落不明。警方当时以意外坠崖结案，但诸多疑点至今未解……', date: getRecentDate(8) }, sender: '静湖日报' }
        ],
        wechat: [
          { type: 'divider', text: getRecentDate(30) + ' 下午14:20' },
          { type: 'other', text: '欢迎使用微信！', sender: '微信团队' },
          { type: 'other', text: '我们致力于为您提供安全、稳定的即时通讯服务。', sender: '微信团队' },
          { type: 'divider', text: getRecentDate(20) + ' 上午10:00' },
          { type: 'other', text: '近期发现有不法分子利用聊天功能传播恶意文件，请勿轻易下载来源不明的压缩包。', sender: '微信安全中心' },
          { type: 'other', text: '如遇到异常情况，请及时向我们反馈。', sender: '微信安全中心' },
          { type: 'divider', text: getRecentDate(2) + ' 下午18:00' },
          { type: 'other', text: '系统提醒：您的账户登录了一台新设备，若非本人操作，请立即修改密码。', sender: '微信团队' }
        ]
      };

      var chatLog = document.getElementById('chatLog');
      var chatHeader = document.getElementById('chatHeader');
      var chatInputArea = document.getElementById('chatInputArea');
      var currentContact = 'linyue';

      function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

      // 创建消息元素（昵称在上方）
      function createMessageElement(type, text, senderName) {
        var row = document.createElement('div');
        row.className = 'message-row ' + type;
        if (type === 'system') {
          row.innerHTML = '<div class="message-body"><div class="bubble">' + escapeHtml(text) + '</div></div>';
          return row;
        }
        // 头像路径
        var avatarSrc = type === 'mine' ? '../assets/images/wechat_avatar_chenyuan.png' : '../assets/images/wechat_avatar_linyue.png';
        var avatarHtml = '<div class="message-avatar"><img src="' + avatarSrc + '" alt="头像" onerror="this.style.display=\'none\'"></div>';
        var nameHtml = senderName ? '<div class="sender-name">' + escapeHtml(senderName) + '</div>' : '';
        var bubbleHtml = '<div class="bubble">' + escapeHtml(text) + '</div>';
        var bodyHtml = '<div class="message-body">' + nameHtml + bubbleHtml + '</div>';
        row.innerHTML = type === 'mine' ? bodyHtml + avatarHtml : avatarHtml + bodyHtml;
        return row;
      }

      // 创建公众号推文（昵称在上方）
      function createArticleElement(article, senderName) {
        var row = document.createElement('div');
        row.className = 'message-row other';
        var avatarHtml = '<div class="message-avatar"><img src="../assets/images/wechat_avatar_linyue.png" alt="头像" onerror="this.style.display=\'none\'"></div>';
        var nameHtml = senderName ? '<div class="sender-name">' + escapeHtml(senderName) + '</div>' : '';
        var cardHtml = '<div class="article-card">' +
          '<div class="cover"><img src="' + (article.cover || '') + '" alt="封面" onerror="this.style.display=\'none\'; this.parentNode.innerHTML=\'<span>封面图</span>\'"></div>' +
          '<div class="title">' + escapeHtml(article.title) + '</div>' +
          '<div class="desc">' + escapeHtml(article.desc) + '</div>' +
          '<div class="pub-date">' + escapeHtml(article.date) + '</div></div>';
        var bodyHtml = '<div class="message-body">' + nameHtml + cardHtml + '</div>';
        row.innerHTML = avatarHtml + bodyHtml;
        return row;
      }

      function renderHistory(contact) {
        var messages = chatData[contact]; if (!messages) return;
        chatLog.innerHTML = '';
        messages.forEach(function(item) {
          if (item.type === 'divider') {
            var div = document.createElement('div'); div.className = 'time-divider'; div.textContent = item.text; chatLog.appendChild(div);
          } else if (item.article) {
            chatLog.appendChild(createArticleElement(item.article, item.sender));
          } else {
            chatLog.appendChild(createMessageElement(item.type, item.text, item.sender));
          }
        });
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      var input = document.getElementById('messageInput'), btn = document.getElementById('sendBtn');
      var autoReplySound = document.getElementById('autoReplySound');

      function sendMessage() {
        if (currentContact !== 'linyue') return;
        var text = input.value.trim();
        if (!text) return;
        chatLog.appendChild(createMessageElement('mine', text, '陈垣'));
        chatLog.scrollTop = chatLog.scrollHeight;
        input.value = '';
        input.focus();

        // 2秒后自动回复
        setTimeout(function() {
          chatLog.appendChild(createMessageElement('other', '[自动回复]你好，我现在不在线，有事请留言。', '林越'));
          chatLog.scrollTop = chatLog.scrollHeight;
          if (autoReplySound) {
            autoReplySound.currentTime = 0;
            autoReplySound.play().catch(function() {});
          }
        }, 2000);
      }

      btn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });

      var contactItems = document.querySelectorAll('.contact-item');
      contactItems.forEach(function(item) {
        item.addEventListener('click', function() {
          contactItems.forEach(function(el) { el.classList.remove('active'); }); item.classList.add('active');
          var contact = item.dataset.contact; var type = item.dataset.type;
          if (contact === currentContact) return; currentContact = contact;
          chatHeader.textContent = item.querySelector('.name').textContent; renderHistory(contact);
          if (type === 'friend') { chatInputArea.classList.remove('hidden'); } else { chatInputArea.classList.add('hidden'); }
        });
      });

      renderHistory('linyue');
    })();
  </script>
</body>
</html>
