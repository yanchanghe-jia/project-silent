<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面 — Windows 11</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #000;
    }
    .wallpaper {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,180,255,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(180,0,255,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(0,255,200,0.15) 0%, transparent 50%),
        linear-gradient(135deg, #0a1f2f 0%, #0c2b3a 40%, #05161f 100%);
      z-index: -1;
    }
    .desktop { position: relative; width: 100%; height: calc(100% - 48px); padding: 30px; display: flex; flex-direction: column; flex-wrap: wrap; gap: 32px; align-content: flex-start; }
    .desktop-icon { width: 90px; text-align: center; color: #fff; font-size: 12px; cursor: pointer; text-shadow: 0 1px 4px rgba(0,0,0,0.7); border-radius: 8px; padding: 6px 4px; transition: background 0.15s; }
    .desktop-icon:hover { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); }
    .desktop-icon .icon-svg { width: 48px; height: 48px; margin: 0 auto 4px; display: flex; align-items: center; justify-content: center; position: relative; }
    .desktop-icon .icon-svg svg { width: 44px; height: 44px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    .desktop-icon .icon-wrap::after {
      content: ""; position: absolute; bottom: -2px; right: -2px;
      width: 18px; height: 18px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><polygon points="5,2 13,8 5,14" fill="white" opacity="0.9"/></svg>') no-repeat center;
      background-size: contain;
    }
    .taskbar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 48px;
      background: rgba(30,30,30,0.85); backdrop-filter: blur(25px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; z-index: 9997;
    }
    .start-btn { width: 40px; height: 40px; margin-left: 8px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
    .start-btn:hover { background: rgba(255,255,255,0.15); }
    .start-btn svg { width: 20px; height: 20px; fill: #fff; }
    .taskbar-center { display: flex; gap: 8px; align-items: center; justify-content: flex-start; padding-left: 8px; flex: 1; height: 100%; }
    .taskbar-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: background 0.15s; color: #fff; position: relative; }
    .taskbar-icon svg { width: 22px; height: 22px; fill: #fff; }
    .taskbar-icon:hover { background: rgba(255,255,255,0.15); }
    .taskbar-icon.active { background: rgba(255,255,255,0.25); border-bottom: 2px solid #4cc2ff; border-radius: 0; }
    .system-tray { display: flex; align-items: center; gap: 16px; padding-right: 16px; color: #fff; font-size: 12px; margin-left: auto; cursor: pointer; }
    .system-tray .tray-icon svg { width: 16px; height: 16px; fill: #fff; opacity: 0.9; }
    .system-tray .clock-area { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2; }
    .system-tray .clock-time { font-size: 13px; }
    .system-tray .clock-date { font-size: 11px; opacity: 0.8; }
    .start-menu {
      position: fixed; bottom: 56px; left: 10px; width: 320px;
      background: rgba(40,40,50,0.95); backdrop-filter: blur(30px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 10000;
      display: none; flex-direction: column; padding: 12px; color: #fff;
    }
    .start-menu.visible { display: flex; }
    .start-menu .menu-item { padding: 10px 16px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .start-menu .menu-item:hover { background: rgba(255,255,255,0.1); }
    .start-menu .menu-item svg { width: 24px; height: 24px; fill: #fff; }
    .start-menu .separator { height: 1px; background: rgba(255,255,255,0.1); margin: 8px 0; }
    .start-menu .power-section { display: flex; justify-content: flex-end; gap: 8px; }
    .start-menu .power-btn { padding: 8px; border-radius: 6px; cursor: pointer; }
    .start-menu .power-btn:hover { background: rgba(255,255,255,0.1); }
    .start-menu .power-btn svg { width: 20px; height: 20px; fill: #fff; }
    .calendar-popup {
      position: fixed; bottom: 56px; right: 10px; width: 280px;
      background: rgba(40,40,50,0.95); backdrop-filter: blur(30px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 10000;
      display: none; padding: 16px; color: #fff;
    }
    .calendar-popup.visible { display: block; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-header .month-year { font-weight: 600; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; text-align: center; font-size: 13px; }
    .calendar-grid .day-name { opacity: 0.6; font-weight: 600; }
    .calendar-grid .day { padding: 6px; border-radius: 50%; cursor: pointer; }
    .calendar-grid .day:hover { background: rgba(255,255,255,0.15); }
    .calendar-grid .day.today { background: #4cc2ff; color: #000; }
    .calendar-time { margin-top: 12px; text-align: center; font-size: 18px; font-weight: 600; }
    .modern-window {
      position: absolute; background: rgba(245,245,250,0.8); backdrop-filter: blur(30px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column;
      resize: both; overflow: hidden; z-index: 100; min-width: 400px; min-height: 300px;
    }
    .modern-window .title-bar { display: flex; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.06); cursor: move; }
    .modern-window .title-bar-text { flex: 1; text-align: center; font-weight: 600; font-size: 13px; color: #1e1e2e; }
    .modern-window .title-bar-buttons { display: flex; gap: 8px; margin-left: auto; }
    .modern-window .title-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
    .modern-window .title-btn.close { background: #ff5f57; }
    .modern-window .title-btn.minimize { background: #febc2e; }
    .modern-window .title-btn.maximize { background: #28c840; }
    .modern-window .window-content { flex: 1; overflow: auto; display: flex; }
    .modern-window .window-content iframe { width: 100%; height: 100%; border: none; flex: 1; }
    .window-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 18px; color: #333; background: rgba(255,255,255,0.6); }
    @keyframes shiverOverlay { 0% { transform: translate(0,0); } 25% { transform: translate(-4px,2px); } 50% { transform: translate(4px,-2px); } 75% { transform: translate(-2px,-2px); } 100% { transform: translate(2px,1px); } }
  </style>
</head>
<body>
  <div class="wallpaper"></div>

  <!-- 音频 -->

  <div class="desktop" id="desktop">

      <div>记事本</div>
    </div>

      <div class="icon-wrap icon-svg"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="18" fill="#555"/><circle cx="24" cy="24" r="10" fill="#AAA"/><path d="M24 2v6m0 32v6M2 24h6m32 0h6M6.4 6.4l4.2 4.2m26.8 26.8l4.2 4.2M6.4 41.6l4.2-4.2m26.8-26.8l4.2-4.2" stroke="#AAA" stroke-width="4" stroke-linecap="round"/></svg></div>
      <div>设置</div>
    </div>
    <div class="desktop-icon" ondblclick="openApp('回收站', '', 'trash', '700px', '550px', recycleBinContent)">
      <div class="icon-wrap icon-svg"><svg viewBox="0 0 48 48"><path d="M12 10h24l-2 28H14L12 10z" fill="#A0A0A0"/><path d="M16 10h16l-1 28H17L16 10z" fill="#D0D0D0"/><rect x="14" y="6" width="20" height="4" rx="2" fill="#888"/></svg></div>
      <div>回收站</div>
    </div>
  </div>

  <div class="taskbar">
    <div class="start-btn" id="startBtn"><svg viewBox="0 0 32 32"><rect x="2" y="2" width="12" height="12" fill="white"/><rect x="18" y="2" width="12" height="12" fill="white"/><rect x="2" y="18" width="12" height="12" fill="white"/><rect x="18" y="18" width="12" height="12" fill="white"/></svg></div>
    <div class="taskbar-center" id="taskbarCenter"></div>
    <div class="system-tray" id="systemTray">
      <span class="tray-icon"><svg viewBox="0 0 16 16"><path d="M1 8h2l1-4h8l1 4h2M3 6l1 6h8l1-6" stroke="white" stroke-width="1" fill="none"/></svg></span>
      <span class="tray-icon"><svg viewBox="0 0 16 16"><polygon points="4,8 8,2 12,8 10,8 10,14 6,14 6,8" fill="white"/></svg></span>
      <div class="clock-area" id="clockArea">
        <div class="clock-time" id="clockTimeDisplay">12:00</div>
        <div class="clock-date" id="clockDateDisplay">2024-01-01</div>
      </div>
    </div>
  </div>

  <div class="start-menu" id="startMenu">
    <div class="menu-item" onclick="openAppFromMenu('Microsoft Edge', 'forum.html', 'browser')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#0078D4"/><path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-3.5 7l7-2.5-2.5 7-7 2.5 2.5-7z" fill="#fff"/></svg><span>Microsoft Edge</span></div>
    <div class="menu-item" onclick="openAppFromMenu('微信', 'chat.html', 'chat', '900px', '650px')"><svg viewBox="0 0 24 24"><rect width="24" height="24" rx="4" fill="#2DC100"/><path d="M16 7H8c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h1.5l2 3 2-3H16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-4 7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm4 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z" fill="#fff"/></svg><span>微信</span></div>
    <div class="menu-item" onclick="openAppFromMenu('文件资源管理器', '', 'explorer', '800px', '600px', fileExplorerContent)"><svg viewBox="0 0 24 24"><path d="M4 6h6l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z" fill="#FFB900"/><path d="M20 10H4v8a2 2 0 002 2h12a2 2 0 002-2v-8z" fill="#FFD54F"/></svg><span>文件资源管理器</span></div>
    <div class="menu-item" onclick="openAppFromMenu('记事本', '', 'notepad', '700px', '550px', notepadContent)"><svg viewBox="0 0 24 24"><rect x="3" y="1" width="18" height="22" rx="2" fill="#4A4A4A"/><rect x="4" y="2" width="16" height="19" fill="#FFF"/><line x1="6" y1="6" x2="18" y2="6" stroke="#AAA" stroke-width="1"/><line x1="6" y1="9" x2="18" y2="9" stroke="#AAA" stroke-width="1"/><line x1="6" y1="12" x2="18" y2="12" stroke="#AAA" stroke-width="1"/></svg><span>记事本</span></div>
    <div class="menu-item" onclick="openAppFromMenu('设置', '', 'settings', '700px', '600px', settingsContent)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#555"/><circle cx="12" cy="12" r="5" fill="#AAA"/><path d="M12 1v3m0 16v3M1 12h3m16 0h3M3.5 3.5l2.1 2.1m12.8 12.8l2.1 2.1M3.5 20.5l2.1-2.1m12.8-12.8l2.1-2.1" stroke="#AAA" stroke-width="2" stroke-linecap="round"/></svg><span>设置</span></div>
    <div class="menu-item" onclick="openAppFromMenu('回收站', '', 'trash', '700px', '550px', recycleBinContent)"><svg viewBox="0 0 24 24"><path d="M6 6h12l-1 14H7L6 6z" fill="#A0A0A0"/><path d="M7 6h10l-1 14H8L7 6z" fill="#D0D0D0"/><rect x="7" y="4" width="10" height="2" rx="1" fill="#888"/></svg><span>回收站</span></div>
    <div class="separator"></div>
    <div class="power-section">
      <div class="power-btn" title="关机"><svg viewBox="0 0 24 24"><path d="M12 2v10m0 8a8 8 0 1 0-8-8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div>
      <div class="power-btn" title="重启"><svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div>

  <div class="calendar-popup" id="calendarPopup">
    <div class="calendar-header"><span id="prevMonth">←</span><span class="month-year" id="monthYear"></span><span id="nextMonth">→</span></div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="calendar-time" id="calendarTimeDisplay"></div>
  </div>

  <script>
    // ==================== 自定义窗口内容 ====================
    const fileExplorerContent = `<div style="display:flex;height:100%;font-family: Segoe UI, Microsoft YaHei;"><div style="width:200px;background:#f7f7f7;padding:15px;border-right:1px solid #ddd;"><div style="font-weight:600;margin-bottom:15px;">此电脑</div><div style="padding:5px 0;cursor:pointer;">📁 文档</div><div style="padding:5px 0;cursor:pointer;">📁 下载</div><div style="padding:5px 0;cursor:pointer;">📁 音乐</div><div style="padding:5px 0;cursor:pointer;">📁 图片</div></div><div style="flex:1;padding:15px;"><div style="font-size:14px;color:#666;">此电脑 > 本地磁盘 (C:)</div><div style="display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;"><div style="text-align:center;cursor:default;">📁 文档</div><div style="text-align:center;cursor:default;">📁 下载</div><div style="text-align:center;cursor:default;">📁 音乐</div><div style="text-align:center;cursor:default;">📁 图片</div><div style="text-align:center;cursor:default;">📁 视频</div></div></div></div>`;
    const notepadContent = `<style>html,body{height:100%;margin:0;overflow:hidden;font-family: Segoe UI, Microsoft YaHei;}</style><div style="display:flex;flex-direction:column;height:100%;"><div style="padding:5px 10px;background:#f0f0f0;border-bottom:1px solid #ccc;flex-shrink:0;"><span style="font-size:12px;">文件 编辑 格式 查看 帮助</span></div><textarea readonly style="flex:1;padding:15px;border:none;outline:none;resize:none;font-family: Consolas, monospace;font-size:14px;line-height:1.6;">今天天气不错。\n我打算整理一下电脑里的旧文件。\n最近总觉得有什么东西在盯着我。\n也许只是多想了。</textarea></div>`;
    const settingsContent = `<div style="display:flex;height:100%;"><div style="width:200px;background:#f7f7f7;padding:15px;border-right:1px solid #ddd;"><div style="font-weight:600;margin-bottom:15px;">设置</div><div style="padding:8px 0;cursor:pointer;">🖥️ 显示</div><div style="padding:8px 0;cursor:pointer;">🔊 声音</div><div style="padding:8px 0;cursor:pointer;">🌐 网络和 Internet</div><div style="padding:8px 0;cursor:pointer;">🔒 隐私和安全</div><div style="padding:8px 0;cursor:pointer;">⚙️ 个性化</div></div><div style="flex:1;padding:30px;"><h2 style="font-weight:400;margin-bottom:20px;">显示</h2><p>分辨率：1920 x 1080 (推荐)</p><p>缩放：100% (推荐)</p><p>方向：横向</p></div></div>`;
    const recycleBinContent = `<style>@keyframes fadeOut { from { opacity:1; } to { opacity:0; } }@keyframes shakeLittle { 0%{transform:translate(0)} 25%{transform:translate(-2px,0)} 50%{transform:translate(2px,0)} 75%{transform:translate(-1px,0)} 100%{transform:translate(0)} }.bin-file { transition: opacity 0.5s; }.bin-file.fading { opacity: 0; }.ghost-message { color: #aa0000; text-align: center; margin-top: 30px; font-family: 'Courier New', monospace; animation: shakeLittle 0.3s; }</style><div style="display:flex;flex-direction:column;height:100%;"><div style="padding:10px;background:#f0f0f0;border-bottom:1px solid #ccc;display:flex;gap:10px;flex-shrink:0;"><button id="emptyBinBtn" style="padding:5px 15px;background:#0078D4;color:white;border:none;border-radius:4px;cursor:pointer;">清空回收站</button></div><div id="binFileList" style="flex:1;padding:20px;overflow:auto;"><div class="bin-file" style="display:flex;align-items:center;gap:15px;padding:10px;border-bottom:1px solid #eee;"><span>📄</span><div><div>旧照片.jpg</div><div style="font-size:12px;color:#999;">已删除 - 2024-11-10</div></div></div><div class="bin-file" style="display:flex;align-items:center;gap:15px;padding:10px;border-bottom:1px solid #eee;"><span>📄</span><div><div>工作文档.docx</div><div style="font-size:12px;color:#999;">已删除 - 2024-11-12</div></div></div><div class="bin-file" style="display:flex;align-items:center;gap:15px;padding:10px;border-bottom:1px solid #eee;"><span>📄</span><div><div>临时文件.tmp</div><div style="font-size:12px;color:#999;">已删除 - 2024-11-14</div></div></div></div></div><script>(function() { const btn = document.getElementById('emptyBinBtn'); const list = document.getElementById('binFileList'); let emptied = false; btn.addEventListener('click', () => { if (emptied) { list.innerHTML = '<div class="ghost-message" style="font-size:18px;">你没有权限删除真相</div>'; setTimeout(() => { list.innerHTML = '<div class="bin-file" style="display:flex;align-items:center;gap:15px;padding:10px;border-bottom:1px solid #eee;"><span>👻</span><div><div>ghost_file.tmp</div><div style="font-size:12px;color:#999;">已删除 - 无法追溯</div></div></div>'; }, 3000); return; } const files = document.querySelectorAll('.bin-file'); files.forEach(f => f.classList.add('fading')); setTimeout(() => { list.innerHTML = '<div class="ghost-message">有些东西无法被删除...</div>'; emptied = true; }, 500); setTimeout(() => { if (emptied) { list.innerHTML = '<div class="bin-file" style="display:flex;align-items:center;gap:15px;padding:10px;border-bottom:1px solid #eee;"><span>👻</span><div><div>ghost_file.tmp</div><div style="font-size:12px;color:#999;">已删除 - 无法追溯</div></div></div>'; } }, 3500); }); })();<\/script>`;

    // ==================== 窗口管理 ====================
    let windowZIndex = 100;
    const openWindows = {};
    let focusedWindowId = null;

    function openApp(title, url, appId, customWidth, customHeight, customContent) {
      if (openWindows[appId]) { focusWindow(appId); return; }
      const winWidth = customWidth || '860px'; const winHeight = customHeight || '620px';
      const win = document.createElement('div'); win.className = 'modern-window'; win.id = 'win-' + appId;
      win.style.left = (120 + Object.keys(openWindows).length * 40) + 'px';
      win.style.top = (100 + Object.keys(openWindows).length * 40) + 'px';
      win.style.width = winWidth; win.style.height = winHeight; win.dataset.appId = appId;
      const titleBar = document.createElement('div'); titleBar.className = 'title-bar';
      titleBar.innerHTML = `<span class="title-bar-text">${title}</span><div class="title-bar-buttons"><div class="title-btn minimize" data-action="minimize"></div><div class="title-btn maximize" data-action="maximize"></div><div class="title-btn close" data-action="close"></div></div>`;
      const content = document.createElement('div'); content.className = 'window-content';
      if (url) { const iframe = document.createElement('iframe'); iframe.src = url; content.appendChild(iframe); }
      else if (customContent) { const iframe = document.createElement('iframe'); iframe.srcdoc = customContent; content.appendChild(iframe); }
      else { const placeholder = document.createElement('div'); placeholder.className = 'window-placeholder'; placeholder.textContent = title + ' — 功能开发中'; content.appendChild(placeholder); }
      win.appendChild(titleBar); win.appendChild(content); document.body.appendChild(win);
      openWindows[appId] = { title, element: win, url }; focusWindow(appId); addTaskbarIcon(appId, title); enableDrag(win, titleBar, appId);
      win.addEventListener('mousedown', () => focusWindow(appId));
      titleBar.querySelectorAll('.title-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const action = btn.dataset.action; if (action === 'minimize') minimizeWindow(appId); else if (action === 'maximize') maximizeWindow(appId); else if (action === 'close') closeWindow(appId); }); });
    }

    function openAppFromMenu(title, url, appId, customWidth, customHeight, customContent) { document.getElementById('startMenu').classList.remove('visible'); openApp(title, url, appId, customWidth, customHeight, customContent); }
    function focusWindow(appId) { if (!openWindows[appId]) return; Object.values(openWindows).forEach(w => w.element.style.zIndex = 100); openWindows[appId].element.style.zIndex = ++windowZIndex; focusedWindowId = appId; document.querySelectorAll('.taskbar-icon').forEach(i => i.classList.remove('active')); const icon = document.querySelector(`.taskbar-icon[data-app-id="${appId}"]`); if (icon) icon.classList.add('active'); }
    function minimizeWindow(appId) { if (!openWindows[appId]) return; openWindows[appId].element.style.display = 'none'; const icon = document.querySelector(`.taskbar-icon[data-app-id="${appId}"]`); if (icon) icon.style.opacity = '0.6'; }
    function closeWindow(appId) { if (!openWindows[appId]) return; openWindows[appId].element.remove(); const icon = document.querySelector(`.taskbar-icon[data-app-id="${appId}"]`); if (icon) icon.remove(); delete openWindows[appId]; if (focusedWindowId === appId) focusedWindowId = null; }
    function maximizeWindow(appId) { const win = openWindows[appId]?.element; if (!win) return; if (win.style.width === '100%') { win.style.width = '860px'; win.style.height = '620px'; win.style.left = '100px'; win.style.top = '100px'; } else { win.style.width = '100%'; win.style.height = 'calc(100% - 48px)'; win.style.left = '0'; win.style.top = '0'; } }
    function addTaskbarIcon(appId, title) {
      const center = document.getElementById('taskbarCenter'); const icon = document.createElement('div'); icon.className = 'taskbar-icon active'; icon.dataset.appId = appId; icon.title = title;
      const iconMap = { browser: '<svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="#0078D4"/><path d="M16 4c-6.63 0-12 5.37-12 12s5.37 12 12 12 12-5.37 12-12S22.63 4 16 4zm-4.5 8.5l8-3-3 8-8 3 3-8z" fill="#fff"/></svg>', chat: '<svg viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#2DC100"/><path d="M22 9H10c-1.7 0-3 1.3-3 3v8c0 1.7 1.3 3 3 3h2l3 5 3-5h4c1.7 0 3-1.3 3-3v-8c0-1.7-1.3-3-3-3zm-6 10c-.8 0-1.5-.7-1.5-1.5S15.2 16 16 16s1.5.7 1.5 1.5S16.8 19 16 19zm6 0c-.8 0-1.5-.7-1.5-1.5S21.2 16 22 16s1.5.7 1.5 1.5S22.8 19 22 19z" fill="#fff"/></svg>', explorer: '<svg viewBox="0 0 32 32"><path d="M4 8h8l3 3h11a3 3 0 013 3v12a3 3 0 01-3 3H4a3 3 0 01-3-3V11a3 3 0 013-3z" fill="#FFB900"/><path d="M28 14H4v8a3 3 0 003 3h18a3 3 0 003-3v-8z" fill="#FFD54F"/></svg>', notepad: '<svg viewBox="0 0 32 32"><rect x="4" y="2" width="24" height="28" rx="3" fill="#4A4A4A"/><rect x="5" y="3" width="22" height="24" fill="#FFF"/><line x1="8" y1="8" x2="24" y2="8" stroke="#AAA" stroke-width="2"/><line x1="8" y1="13" x2="24" y2="13" stroke="#AAA" stroke-width="2"/><line x1="8" y1="18" x2="24" y2="18" stroke="#AAA" stroke-width="2"/></svg>', settings: '<svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="12" fill="#555"/><circle cx="16" cy="16" r="6" fill="#AAA"/><path d="M16 1v4m0 22v4M1 16h4m22 0h4M4.4 4.4l2.8 2.8m17.6 17.6l2.8 2.8M4.4 27.6l2.8-2.8m17.6-17.6l2.8-2.8" stroke="#AAA" stroke-width="3" stroke-linecap="round"/></svg>', trash: '<svg viewBox="0 0 32 32"><path d="M7 7h18l-1.5 22H8.5L7 7z" fill="#A0A0A0"/><path d="M9 7h14l-1 22H10L9 7z" fill="#D0D0D0"/><rect x="9" y="4" width="14" height="3" rx="1" fill="#888"/></svg>' };
      icon.innerHTML = iconMap[appId] || '<svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="#666"/></svg>';
      icon.onclick = () => { if (openWindows[appId]) { if (openWindows[appId].element.style.display === 'none') { openWindows[appId].element.style.display = 'flex'; focusWindow(appId); } else if (focusedWindowId === appId) { minimizeWindow(appId); } else { focusWindow(appId); } } };
      center.appendChild(icon); document.querySelectorAll('.taskbar-icon').forEach(i => i.classList.remove('active')); icon.classList.add('active');
    }
    function enableDrag(win, handle, appId) { let offsetX, offsetY, dragging = false; handle.addEventListener('mousedown', (e) => { if (e.target.classList.contains('title-btn')) return; dragging = true; const rect = win.getBoundingClientRect(); offsetX = e.clientX - rect.left; offsetY = e.clientY - rect.top; win.style.cursor = 'move'; e.preventDefault(); }); document.addEventListener('mousemove', (e) => { if (!dragging) return; const x = e.clientX - offsetX; const y = e.clientY - offsetY; win.style.left = Math.max(0, Math.min(window.innerWidth - 200, x)) + 'px'; win.style.top = Math.max(0, Math.min(window.innerHeight - 80, y)) + 'px'; }); document.addEventListener('mouseup', () => { dragging = false; win.style.cursor = ''; }); }

    // ==================== 开始菜单与系统托盘 ====================
    const startBtn = document.getElementById('startBtn'), startMenu = document.getElementById('startMenu'), systemTray = document.getElementById('systemTray'), calendarPopup = document.getElementById('calendarPopup');
    startBtn.addEventListener('click', (e) => { e.stopPropagation(); startMenu.classList.toggle('visible'); calendarPopup.classList.remove('visible'); });
    systemTray.addEventListener('click', (e) => { e.stopPropagation(); calendarPopup.classList.toggle('visible'); startMenu.classList.remove('visible'); renderCalendar(); });
    document.addEventListener('click', (e) => { if (!startMenu.contains(e.target) && e.target !== startBtn) startMenu.classList.remove('visible'); if (!calendarPopup.contains(e.target) && e.target !== systemTray && !systemTray.contains(e.target)) calendarPopup.classList.remove('visible'); });

    // ==================== 时钟与日历 ====================
    function updateClock() { const now = new Date(); document.getElementById('clockTimeDisplay').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0'); document.getElementById('clockDateDisplay').textContent = now.getFullYear() + '-' + (now.getMonth()+1).toString().padStart(2,'0') + '-' + now.getDate().toString().padStart(2,'0'); document.getElementById('calendarTimeDisplay').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0'); }
    function renderCalendar() { const now = new Date(); const year = now.getFullYear(); const month = now.getMonth(); document.getElementById('monthYear').textContent = `${year}年${month+1}月`; const grid = document.getElementById('calendarGrid'); grid.innerHTML = ''; ['日','一','二','三','四','五','六'].forEach(name => { const dayEl = document.createElement('div'); dayEl.className = 'day-name'; dayEl.textContent = name; grid.appendChild(dayEl); }); const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month+1, 0).getDate(); for (let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div')); for (let d=1; d<=daysInMonth; d++) { const dayEl = document.createElement('div'); dayEl.className = 'day'; if (d === now.getDate() && month === now.getMonth() && year === now.getFullYear()) dayEl.classList.add('today'); dayEl.textContent = d; grid.appendChild(dayEl); } }
    setInterval(updateClock, 1000); updateClock();

    // ==================== 禁止开发者工具 ====================
    document.addEventListener('keydown', function(e) { const key = e.key; const ctrl = e.ctrlKey || e.metaKey; const shift = e.shiftKey; if (key === 'F12') { e.preventDefault(); showDevToolsBlocked(); return; } if (ctrl && shift && (key === 'I' || key === 'J' || key === 'C')) { e.preventDefault(); showDevToolsBlocked(); return; } if (ctrl && key === 'U') { e.preventDefault(); showDevToolsBlocked(); return; } });
    function showDevToolsBlocked() { if (document.getElementById('devtools-blocked-dialog')) return; const dialog = document.createElement('div'); dialog.id = 'devtools-blocked-dialog'; dialog.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); backdrop-filter: blur(20px); border: 1px solid #555; border-radius: 12px; padding: 25px; color: #fff; font-family: "Segoe UI","Microsoft YaHei",sans-serif; z-index: 100000; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); min-width: 280px;'; dialog.innerHTML = '<p style="font-size: 16px; margin-bottom: 20px;">开发者选项已被禁止</p><button id="devtools-blocked-ok" style="padding: 8px 25px; background: #0078D4; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">确定</button>'; document.body.appendChild(dialog); document.getElementById('devtools-blocked-ok').addEventListener('click', function() { dialog.remove(); }); }

    // ==================== 音频控制 ====================
    const bgmDesktop = document.getElementById('bgmDesktop'), sfxClick = document.getElementById('sfxClick'), sfxTransition = document.getElementById('sfxTransition'), sfxDownload = document.getElementById('sfxDownload'), sfxExtract = document.getElementById('sfxExtract');
    document.addEventListener('click', function initAudio() { if (bgmDesktop.paused) { bgmDesktop.volume = 0.3; bgmDesktop.play().catch(() => {}); } document.removeEventListener('click', initAudio); }, { once: true });
    function playClickSound() { sfxClick.currentTime = 0; sfxClick.volume = 0.5; sfxClick.play().catch(() => {}); }
    const originalOpenApp = openApp; openApp = function(...args) { playClickSound(); originalOpenApp(...args); };
    const originalOpenAppFromMenu = openAppFromMenu; openAppFromMenu = function(...args) { playClickSound(); originalOpenAppFromMenu(...args); };

    // ==================== 下载、解压、过渡 ====================
    window.addEventListener('message', (e) => { if (e.data && e.data.type === 'download_complete') { createZipIcon(); sfxDownload.play().catch(() => {}); } });

    function createZipIcon() { if (document.getElementById('icon-zip')) return; const desktop = document.getElementById('desktop'); const iconDiv = document.createElement('div'); iconDiv.className = 'desktop-icon'; iconDiv.id = 'icon-zip'; iconDiv.setAttribute('ondblclick', 'unpackZip()'); iconDiv.innerHTML = '<div class="icon-wrap icon-svg"><svg viewBox="0 0 48 48"><rect x="8" y="6" width="32" height="36" rx="4" fill="#E0C36A"/><rect x="8" y="6" width="32" height="12" rx="4" fill="#F0D080"/><line x1="14" y1="14" x2="34" y2="14" stroke="#B09040" stroke-width="2"/></svg></div><div>silent_archive.zip</div>'; desktop.appendChild(iconDiv); }

    function unpackZip() { if (document.getElementById('icon-zip-corrupted') || document.getElementById('icon-exe')) return; sfxExtract.currentTime = 0; sfxExtract.play().catch(() => {}); const confirmBox = document.createElement('div'); confirmBox.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); backdrop-filter: blur(20px); border: 1px solid #555; border-radius: 12px; padding: 25px; color: #fff; font-family: "Segoe UI","Microsoft YaHei"; z-index: 10001; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); min-width: 300px;'; confirmBox.innerHTML = '<h3 style="margin-bottom:15px;">解压文件</h3><p style="margin-bottom:20px;">确定要解压 silent_archive.zip 吗？</p><div style="display:flex; gap:10px; justify-content:center;"><button id="confirmYes" style="padding:8px 25px; background:#0078D4; color:white; border:none; border-radius:6px; cursor:pointer;">确定</button><button id="confirmNo" style="padding:8px 25px; background:#444; color:white; border:none; border-radius:6px; cursor:pointer;">取消</button></div>'; document.body.appendChild(confirmBox); document.getElementById('confirmYes').onclick = () => { confirmBox.remove(); simulateExtraction(); }; document.getElementById('confirmNo').onclick = () => confirmBox.remove(); }

    function simulateExtraction() { const progressOverlay = document.createElement('div'); progressOverlay.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); border: 1px solid #555; border-radius: 12px; padding: 25px; color: #fff; font-family: "Segoe UI"; z-index: 10001; text-align: center; min-width: 250px;'; progressOverlay.innerHTML = '<p>正在解压...</p><div style="width:100%; height:6px; background:#333; border-radius:3px; margin:15px 0;"><div id="extractFill" style="width:0%; height:100%; background:#4cc2ff; border-radius:3px; transition: width 0.3s linear;"></div></div><span id="extractPercent">0%</span>'; document.body.appendChild(progressOverlay); let percent = 0; const interval = setInterval(() => { percent += Math.random() * 20 + 10; if (percent >= 100) { percent = 100; clearInterval(interval); document.getElementById('extractFill').style.width = '100%'; document.getElementById('extractPercent').textContent = '100%'; setTimeout(() => { progressOverlay.remove(); finishExtraction(); }, 500); } else { document.getElementById('extractFill').style.width = percent + '%'; document.getElementById('extractPercent').textContent = Math.floor(percent) + '%'; } }, 300); }

    function finishExtraction() { const oldZip = document.getElementById('icon-zip'); if (oldZip) oldZip.remove(); const desktop = document.getElementById('desktop'); const iconDiv = document.createElement('div'); iconDiv.className = 'desktop-icon'; iconDiv.id = 'icon-zip-corrupted'; iconDiv.setAttribute('ondblclick', 'alertZipCorrupted()'); iconDiv.innerHTML = '<div class="icon-wrap icon-svg"><svg viewBox="0 0 48 48"><rect x="8" y="6" width="32" height="36" rx="4" fill="#8B8B8B"/><rect x="8" y="6" width="32" height="12" rx="4" fill="#A0A0A0"/><line x1="14" y1="14" x2="34" y2="14" stroke="#666" stroke-width="2"/><text x="24" y="32" text-anchor="middle" fill="#600" font-size="14" font-family="monospace">⚠</text></svg></div><div>silent_archive.zip (已损坏)</div>'; desktop.appendChild(iconDiv); createExeIcon(); }
    function alertZipCorrupted() { const alertBox = document.createElement('div'); alertBox.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); backdrop-filter: blur(20px); border: 1px solid #555; border-radius: 12px; padding: 25px; color: #fff; font-family: "Segoe UI"; z-index: 10001; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7);'; alertBox.innerHTML = '<p>文件已损坏，无法打开。</p><button style="margin-top:15px; padding:6px 20px; background:#555; color:white; border:none; border-radius:4px; cursor:pointer;" onclick="this.parentNode.remove()">确定</button>'; document.body.appendChild(alertBox); }
    function createExeIcon() { if (document.getElementById('icon-exe')) return; const desktop = document.getElementById('desktop'); const iconDiv = document.createElement('div'); iconDiv.className = 'desktop-icon'; iconDiv.id = 'icon-exe'; iconDiv.setAttribute('ondblclick', 'triggerTransition()'); iconDiv.innerHTML = '<div class="icon-wrap icon-svg"><svg viewBox="0 0 48 48"><rect x="8" y="4" width="32" height="40" rx="4" fill="#c0c0c0"/><rect x="12" y="12" width="24" height="20" fill="#000080"/><text x="24" y="26" text-anchor="middle" fill="white" font-size="10" font-family="monospace">EXE</text></svg></div><div>silent_archive.exe</div>'; desktop.appendChild(iconDiv); }

    function triggerTransition() {
      bgmDesktop.pause();
      sfxTransition.currentTime = 0; sfxTransition.volume = 0.8; sfxTransition.play().catch(() => {});
      const overlay = document.createElement('div'); overlay.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center; flex-direction: column; pointer-events: all; animation: shiverOverlay 0.2s infinite;';
      const textDiv = document.createElement('div'); textDiv.style.cssText = 'color:red; font-family:monospace; font-size:24px; letter-spacing:2px;'; textDiv.id = 'transitionText'; overlay.appendChild(textDiv);
      const canvas = document.createElement('canvas'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; canvas.style.cssText = 'position:absolute; top:0; left:0; z-index:-1;'; overlay.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      function drawNoise() { const imageData = ctx.createImageData(canvas.width, canvas.height); for (let i = 0; i < imageData.data.length; i += 4) { const val = Math.random() < 0.4 ? (Math.random() < 0.5 ? 255 : 0) : 0; imageData.data[i] = val; imageData.data[i+1] = val; imageData.data[i+2] = val; imageData.data[i+3] = 120; } ctx.putImageData(imageData, 0, 0); }
      let noiseInterval = setInterval(drawNoise, 80); setTimeout(() => { clearInterval(noiseInterval); }, 2500);
      const fullText = '连接已建立 — 1998-12-24 02:33:17'; let index = 0;
      const typeInterval = setInterval(() => { textDiv.textContent += fullText[index]; index++; if (index >= fullText.length) clearInterval(typeInterval); }, 80);
      document.body.appendChild(overlay);
      setTimeout(() => { if (window.parent !== window) { window.parent.postMessage({ type: 'navigate', url: 'inner-world/win98_desktop.html' }, '*'); } else { window.location.href = 'inner-world/win98_desktop.html'; } }, 2500);
    }
  </script>
