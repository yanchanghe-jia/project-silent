<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT SILENT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; flex-direction: column; text-align: center;
    }
    .overlay.hidden { display: none; }
    .title {
      font-size: 32px; color: #fff; letter-spacing: 6px;
      margin-bottom: 40px; text-shadow: 0 0 10px rgba(255,0,0,0.5);
    }
    .warning-box {
      border: 1px solid #444; padding: 30px; margin-bottom: 40px;
      background: rgba(255,255,255,0.02); text-align: left; line-height: 2;
      max-width: 500px;
    }
    .warning-box h3 { color: #ff4444; font-size: 16px; margin-bottom: 20px; text-align: center; }
    .warning-box p { font-size: 13px; color: #999; }
    .start-btn {
      display: inline-block; padding: 15px 50px; background: transparent;
      color: #fff; border: 1px solid #666; font-family: 'Courier New', monospace;
      font-size: 18px; cursor: pointer; letter-spacing: 4px;
      transition: all 0.3s; text-decoration: none;
    }
    .start-btn:hover { background: rgba(255,0,0,0.15); border-color: #ff4444; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
    .footer { margin-top: 30px; font-size: 11px; color: #555; }
    #gameFrame {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      border: none; display: none;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="title">PROJECT SILENT</div>
    <div class="warning-box">
      <h3>⚠ 游玩前请阅读</h3>
      <p>
        本游戏包含微恐元素、闪烁画面和心理暗示内容。<br>
        建议在黑暗环境中佩戴耳机游玩以获得完整体验。<br>
        请勿在精神状态不佳时进行游戏。<br>
        游戏中的一切皆为虚构，请勿模仿任何行为。
      </p>
    </div>
    <button class="start-btn" id="startBtn">开始游戏</button>
    <div class="footer">作者：巧克力饼干</div>
  </div>

  <iframe id="gameFrame" allow="fullscreen"></iframe>

  <script>
    const overlay = document.getElementById('overlay');
    const gameFrame = document.getElementById('gameFrame');
    const startBtn = document.getElementById('startBtn');

    startBtn.addEventListener('click', () => {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();

      overlay.classList.add('hidden');
      gameFrame.style.display = 'block';
      gameFrame.src = 'table-world/index.html';
    });

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'navigate') {
        const loadMask = document.createElement('div');
        loadMask.id = 'loadMask';
        loadMask.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;';
        document.body.appendChild(loadMask);
        gameFrame.onload = () => { setTimeout(() => loadMask.remove(), 200); };
        gameFrame.src = e.data.url;
      }
    });
  </script>
</body>
</html>
