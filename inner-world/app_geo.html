<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坐标定位</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #c0c0c0; font-family: 'Microsoft Sans Serif', 'VT323', monospace; }
    .app-container { display: flex; flex-direction: column; height: 100%; padding: 8px; }
    .app-header { background: #000080; color: white; padding: 6px 10px; font-size: 14px; font-weight: bold; margin-bottom: 6px; flex-shrink: 0; }
    .coord-box { margin-bottom: 8px; flex-shrink: 0; background: #f0f0f0; padding: 10px; border: 2px inset #e0e0e0; }
    .coord-box .row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .coord-box .row:last-child { margin-bottom: 0; }
    .coord-box label { font-weight: bold; min-width: 70px; font-size: 14px; }
    .coord-box input { width: 60px; padding: 4px 6px; border: 2px inset #e0e0e0; font-family: 'VT323', monospace; font-size: 16px; text-align: center; }
    .coord-box span { font-size: 14px; color: #333; }
    .coord-box button { padding: 4px 16px; background: #c0c0c0; border: 2px outset #e0e0e0; font-family: 'VT323', monospace; font-size: 14px; cursor: pointer; margin-top: 8px; }
    .coord-box button:active { border-style: inset; }
    .result-area { flex: 1; overflow: auto; background: #fff; border: 2px inset #e0e0e0; padding: 10px; font-size: 14px; line-height: 1.6; }
    .error { color: #aa0000; }
    .file-header { font-weight: bold; margin-bottom: 10px; }
    .map-placeholder { width: 100%; height: 150px; background: #ddd; display: flex; align-items: center; justify-content: center; margin: 10px 0; border: 1px solid #aaa; cursor: pointer; }
    .access-denied { color: #aa0000; text-align: center; margin-top: 50px; font-size: 18px; font-weight: bold; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">静湖镇警局 - 坐标定位系统</div>
    <div class="coord-box" id="coordBox">
      <div class="row">
        <label>北纬:</label>
        <input type="number" id="latDeg" placeholder="" min="0" max="90"> °
        <input type="number" id="latMin" placeholder="" min="0" max="60"> ' N
      </div>
      <div class="row">
        <label>东经:</label>
        <input type="number" id="lngDeg" placeholder="" min="0" max="180"> °
        <input type="number" id="lngMin" placeholder="" min="0" max="60"> ' E
      </div>
      <button id="searchBtn">定位</button>
    </div>
    <div class="result-area" id="resultArea">
      <p>请输入经纬度进行定位。线索可在物证和通讯记录中找到。</p>
    </div>
    <div class="coord-box hidden" id="codeBox">
      <div class="row">
        <label>口令:</label>
        <input type="text" id="codeInput" placeholder="输入口令">
        <button id="codeBtn">确认</button>
      </div>
    </div>
  </div>

  <script>
    var accessToken = localStorage.getItem('geo_access');
    if (!accessToken) {
      document.getElementById('resultArea').innerHTML = '<div class="access-denied">访问被拒绝<br>该应用尚未授权</div>';
      document.getElementById('coordBox').style.display = 'none';
    } else {
      initApp();
    }

    function initApp() {
      var errorCount = 0;
      var SHAKE_THRESHOLD = 3;

      var latDeg = document.getElementById('latDeg');
      var latMin = document.getElementById('latMin');
      var lngDeg = document.getElementById('lngDeg');
      var lngMin = document.getElementById('lngMin');
      var btn = document.getElementById('searchBtn');
      var result = document.getElementById('resultArea');
      var codeBox = document.getElementById('codeBox');
      var codeInput = document.getElementById('codeInput');
      var codeBtn = document.getElementById('codeBtn');

      function displayResult(message, isError) {
        result.innerHTML = '';
        var p = document.createElement('div');
        p.className = isError ? 'error' : '';
        p.innerHTML = message;
        result.appendChild(p);
      }

      function showLocation() {
        result.innerHTML = '';
        var header = document.createElement('div');
        header.className = 'file-header';
        header.textContent = '坐标：北纬39°24\'，东经115°48\' —— 静湖镇废弃观测站';
        result.appendChild(header);

        var map = document.createElement('div');
        map.className = 'map-placeholder';
        map.innerHTML = '<span>[ 地图标记 ]<br>点击查看详情</span>';
        map.addEventListener('click', function() {
          window.parent.postMessage({ type: 'trigger_ending', ending: 'normal' }, '*');
        });
        result.appendChild(map);

        if (localStorage.getItem('true_ending_access') === 'true') {
          codeBox.classList.remove('hidden');
        }
      }

      function search() {
        var latD = parseInt(latDeg.value) || 0;
        var latM = parseInt(latMin.value) || 0;
        var lngD = parseInt(lngDeg.value) || 0;
        var lngM = parseInt(lngMin.value) || 0;

        if (latD === 39 && latM === 24 && lngD === 115 && lngM === 48) {
          showLocation();
          errorCount = 0;
        } else {
          errorCount++;
          displayResult('坐标无效。请检查线索后重试。', true);
          window.parent.postMessage({ type: 'error_count' }, '*');
          if (errorCount >= SHAKE_THRESHOLD) {
            window.parent.postMessage({ type: 'horror_effect', effect: 'screenShiver' }, '*');
            errorCount = 0;
          }
        }
      }

      btn.addEventListener('click', search);

      codeBtn.addEventListener('click', function() {
        var code = codeInput.value.trim().toUpperCase();
        if (code === 'CPEC') {
          window.parent.postMessage({ type: 'trigger_ending', ending: 'true' }, '*');
        } else {
          alert('口令错误');
        }
      });
    }
  </script>
</body>
</html>
