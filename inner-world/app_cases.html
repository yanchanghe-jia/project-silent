<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案宗索引</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #c0c0c0;
      font-family: 'Microsoft Sans Serif', 'VT323', monospace;
      user-select: none;
    }
    .app-container {
      display: flex; flex-direction: column; height: 100%; padding: 8px;
    }
    .app-header {
      background: #000080; color: white; padding: 6px 10px;
      font-size: 14px; font-weight: bold; margin-bottom: 6px; flex-shrink: 0;
    }
    .search-box {
      display: flex; gap: 6px; margin-bottom: 8px; flex-shrink: 0;
      align-items: center;
    }
    .search-box input {
      flex: 1;
      min-width: 260px;              /* 保证足够宽 */
      padding: 6px 10px;
      border: 2px inset #e0e0e0;
      font-family: 'VT323', monospace;
      font-size: 16px;
      background: #fff;
      max-width: 100%;
    }
    .search-box button {
      padding: 6px 18px;
      background: #c0c0c0;
      border: 2px outset #e0e0e0;
      font-family: 'VT323', monospace;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-box button:active { border-style: inset; }
    .result-area {
      flex: 1; overflow: auto; background: #fff;
      border: 2px inset #e0e0e0; padding: 10px;
      font-size: 14px; line-height: 1.6;
    }
    .error { color: #aa0000; }
    .file-header { font-weight: bold; margin-bottom: 10px; }
    .file-content { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">静湖镇警局 - 案宗索引系统</div>
    <div class="search-box">
      <input type="text" id="caseNumber" placeholder="输入案卷编号以查询" maxlength="20">
      <button id="searchBtn">检索</button>
    </div>
    <div class="result-area" id="resultArea">
      <p>请输入案卷编号进行查询。编号格式见内部备忘录。</p>
    </div>
  </div>

  <script>
    const caseDatabase = {
      'C-1993-1224-042': {
        title: '魏明远失踪案 (编号: C-1993-1224-042)',
        content: `案件编号: C-1993-1224-042
案件类型: C (失踪案)
案发日期: 1993年12月24日
案发地点: 静湖镇天文观测站
归档年份: 1998年
报案人: 观测站门卫 (详见员工名册)
概述: 研究员魏明远在值夜班期间失踪，现场未发现打斗痕迹，个人物品遗留。初步调查以意外坠崖结案，但疑点甚多。

物证清单:
  EV-031 (无线电对讲机)
  EV-012 (手电筒)
  EV-055 (工作服)
  EV-078 (望远镜)
  EV-102 (笔记本碎片)

备注: 相关证人的详细档案可通过人员档案系统查询，工号需从员工名册获取。`,
        unlock: 'personnel'
      },
      'C-1993-1224-018': { title: '无法访问 (编号: C-1993-1224-018)', content: '案件编号: C-1993-1224-018\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1224-035': { title: '无法访问 (编号: C-1993-1224-035)', content: '案件编号: C-1993-1224-035\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1224-077': { title: '无法访问 (编号: C-1993-1224-077)', content: '案件编号: C-1993-1224-077\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1224-101': { title: '无法访问 (编号: C-1993-1224-101)', content: '案件编号: C-1993-1224-101\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1224-205': { title: '无法访问 (编号: C-1993-1224-205)', content: '案件编号: C-1993-1224-205\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1224-330': { title: '无法访问 (编号: C-1993-1224-330)', content: '案件编号: C-1993-1224-330\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1224-501': { title: '无法访问 (编号: C-1993-1224-501)', content: '案件编号: C-1993-1224-501\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1224-502': { title: '无法访问 (编号: C-1993-1224-502)', content: '案件编号: C-1993-1224-502\n权限不足。该案卷已被限制查阅。' },
      'C-1993-1223-042': { title: '未找到案卷 (编号: C-1993-1223-042)', content: '案件编号: C-1993-1223-042\n日期不符。该日期无失踪案记录。' },
      'C-1993-1225-042': { title: '未找到案卷 (编号: C-1993-1225-042)', content: '案件编号: C-1993-1225-042\n日期不符。该日期无失踪案记录。' },
      'C-1994-1224-042': { title: '未找到案卷 (编号: C-1994-1224-042)', content: '案件编号: C-1994-1224-042\n年份不符。请核对案发年份。' },
      'C-1992-1224-042': { title: '未找到案卷 (编号: C-1992-1224-042)', content: '案件编号: C-1992-1224-042\n年份不符。请核对案发年份。' },
      'C-1995-0312-101': { title: '盗窃案 (编号: C-1995-0312-101)', content: '案件编号: C-1995-0312-101\n案件类型: C (财产案)\n案发日期: 1995年3月12日\n案发地点: 静湖镇杂货店\n概述: 一起小型盗窃案，已结案。' },
      'C-1996-0715-102': { title: '交通事故 (编号: C-1996-0715-102)', content: '案件编号: C-1996-0715-102\n案件类型: C (交通案)\n案发日期: 1996年7月15日\n案发地点: 镇外高速公路\n概述: 两车相撞，一人轻伤。' },
      'C-1997-1102-103': { title: '失踪人口 (编号: C-1997-1102-103)', content: '案件编号: C-1997-1102-103\n案件类型: C (失踪案)\n案发日期: 1997年11月2日\n案发地点: 静湖镇北郊\n概述: 一名老人走失，次日被寻回。' },
      'C-1998-0105-104': { title: '纵火案 (编号: C-1998-0105-104)', content: '案件编号: C-1998-0105-104\n案件类型: C (纵火案)\n案发日期: 1998年1月5日\n案发地点: 废弃仓库\n概述: 疑似人为纵火，无人员伤亡。' },
      'C-1998-0507-105': { title: '故意伤害 (编号: C-1998-0507-105)', content: '案件编号: C-1998-0507-105\n案件类型: C (伤害案)\n案发日期: 1998年5月7日\n案发地点: 静湖镇酒吧\n概述: 酒后斗殴，一人轻伤。' },
      'C-1998-0821-205': { title: '入室盗窃 (编号: C-1998-0821-205)', content: '案件编号: C-1998-0821-205\n案件类型: C (财产案)\n案发日期: 1998年8月21日\n案发地点: 镇东居民区\n概述: 多户被盗，嫌疑人在逃。' },
      'C-1998-1120-330': { title: '失踪人口 (编号: C-1998-1120-330)', content: '案件编号: C-1998-1120-330\n案件类型: C (失踪案)\n案发日期: 1998年11月20日\n案发地点: 镇外山区\n概述: 一名驴友失联，三日后自行返回。' }
    };

    let errorCount = 0;
    const SHAKE_THRESHOLD = 3;

    const input = document.getElementById('caseNumber');
    const btn = document.getElementById('searchBtn');
    const result = document.getElementById('resultArea');

    function displayResult(message, isError = false) {
      result.innerHTML = '';
      const p = document.createElement('div');
      p.className = isError ? 'error' : '';
      p.innerHTML = message;
      result.appendChild(p);
    }

    function showFile(data) {
      result.innerHTML = '';
      const header = document.createElement('div');
      header.className = 'file-header';
      header.textContent = data.title;
      result.appendChild(header);
      const content = document.createElement('div');
      content.className = 'file-content';
      content.textContent = data.content;
      result.appendChild(content);

      if (data.unlock && window.parent !== window) {
        window.parent.postMessage({ type: 'unlock', app: data.unlock, token: true }, '*');
      }
    }

    function search() {
      const number = input.value.trim().toUpperCase();
      if (!number) { displayResult('请输入案卷编号。格式：C-年份-月日-工号', true); return; }

      const record = caseDatabase[number];
      if (record) {
        showFile(record);
        errorCount = 0;
      } else {
        errorCount++;
        displayResult('无此案卷。请确认编号格式正确。详见内部备忘录。', true);
            // 每次错误都发送计数消息给桌面
        window.parent.postMessage({ type: 'error_count' }, '*');

        if (errorCount >= SHAKE_THRESHOLD) {
          if (window.parent !== window) {
            window.parent.postMessage({ type: 'horror_effect', effect: 'screenShiver' }, '*');
          }
          errorCount = 0;
        }
      }
    }

    btn.addEventListener('click', search);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });
  </script>
</body>
</html>
