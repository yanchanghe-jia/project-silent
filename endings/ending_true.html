<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>结局：【循环】</title>
  <style>
    body {
      background: #1a1a0a; color: #ffcc00;
      font-family: 'Courier New', monospace;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
    }
    .ending-box { text-align: center; max-width: 600px; padding: 40px; }
    h1 { font-size: 28px; letter-spacing: 6px; margin-bottom: 30px; animation: glow 3s infinite; }
    @keyframes glow { 0%,100%{text-shadow:0 0 10px #ffcc00} 50%{text-shadow:0 0 30px #ffaa00} }
    p { line-height: 2; font-size: 16px; }
    .loop { margin-top: 30px; font-size: 14px; opacity: 0.7; font-style: italic; }
    .author { margin-top: 40px; font-size: 13px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="ending-box">
    <h1>【循环】</h1>
    <p>
      你解开了所有谜团，拼出了那个口令。<br>
      魏明远的最后信息让你打破了屏障。<br>
      但循环并未结束。<br>
      你成为了下一个接棒者。
    </p>
    <div class="loop">"我是陈垣，我不知道这是第几次了。<br>但林越，这次我一定会找到你。"</div>
    <div class="author">—— 巧克力饼干</div>
  </div>
</body>
</html>
