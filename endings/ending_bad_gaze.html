<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>结局：【直视】</title>
  <style>
    body {
      background: #000; color: #cc0000;
      font-family: 'Courier New', monospace;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
    }
    .ending-box { text-align: center; max-width: 600px; padding: 40px; }
    h1 { font-size: 28px; letter-spacing: 6px; margin-bottom: 30px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    p { line-height: 2; font-size: 16px; color: #aa0000; }
    .author { margin-top: 40px; font-size: 13px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="ending-box">
    <h1>【直视】</h1>
    <p>
      好奇心打开了不该开的门。<br>
      你成了祂的下一双眼睛。<br>
      永远凝视着屏幕另一端的人。
    </p>
    <div class="author">—— 巧克力饼干</div>
  </div>
</body>
</html>
